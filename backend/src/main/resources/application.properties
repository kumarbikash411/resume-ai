# ================================
# APPLICATION CONFIG
# ================================
spring.application.name=ResumeAI

server.port=8080

# ================================
# DATABASE - PostgreSQL
# ================================
spring.datasource.url=jdbc:postgresql://localhost:5432/resumeai_db
spring.datasource.username=postgres
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ================================
# JWT CONFIG
# ================================
app.jwt.secret=MyVeryLongAndSecureJWTSecretKeyForResumeAIApp2024!@#$%
app.jwt.expiration=86400000

# ================================
# FILE UPLOAD
# ================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ================================
# OPENAI CONFIG
# ================================
openai.api.key=sk-your-openai-api-key-here
openai.api.url=https://api.openai.com/v1
openai.model=gpt-4o-mini
openai.max-tokens=2000

# ================================
# CORS
# ================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ================================
# LOGGING
# ================================
logging.level.com.resumeai=DEBUG
logging.level.org.springframework.security=INFO
