version: '3.8'

services:
  # ==============================
  # PostgreSQL Database
  # ==============================
  postgres:
    image: postgres:16-alpine
    container_name: resumeai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: resumeai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resumeai_net

  # ==============================
  # Spring Boot Backend
  # ==============================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resumeai_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/resumeai_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres123}
      APP_JWT_SECRET: ${JWT_SECRET:-MyVeryLongAndSecureJWTSecretKeyForResumeAIApp2024}
      APP_JWT_EXPIRATION: 86400000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      APP_UPLOAD_DIR: /app/uploads
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:80
    volumes:
      - resume_uploads:/app/uploads
    ports:
      - "8080:8080"
    networks:
      - resumeai_net

  # ==============================
  # React Frontend
  # ==============================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resumeai_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - resumeai_net

volumes:
  postgres_data:
  resume_uploads:

networks:
  resumeai_net:
    driver: bridge
